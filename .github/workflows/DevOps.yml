
name: DevOps-WorkFlow
on: [push, workflow_dispatch]

jobs:
  Server-Connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Say hi
        run: echo "Hi!"
      - name: Print working directory
        run: pwd
      - name: List directory contents
        run: ls -la
      - name: Check IP address of server
        run: hostname -I
      #- name: Check connectivity of Internet
      #  run: ping -c 4 -W 5 8.8.8.8
  lists-files:
    runs-on: ubuntu-latest
    steps:
      - name: list of dir
        run: ls -lrt
      - name: Print prashant variable
        run: |
          prashant="hello pk"
          echo $prashant
      - name: Convert string to base64
        run: |
          original_var="DevOps-Automation-Pipeline-Dev"
          base64_var=$(echo -n "$original_var" | base64)
          echo "Original String: $original_var"
          echo "Base64 Encoded: $base64_var"
          echo -n "$original_var" | base64
      - name: Decode base64 string
        run: |
          base64_encoded="RGV2T3BzLUF1dG9tYXRpb24tUGlwZWxpbmUtRGV2"
          decoded_var=$(echo -n "$base64_encoded" | base64 -d)
          echo "Base64 Encoded: $base64_encoded"
          echo "Decoded String: $decoded_var"
