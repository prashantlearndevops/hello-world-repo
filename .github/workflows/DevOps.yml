
name: DevOps-WorkFlow
on: [push]

jobs:
  Server-Connectivity:
    runs-on: ubuntu-latest
    steps:
      - name: Say hi
        run: echo "Hi!"
      - name: Print working directory
        run: pwd
      - name: List directory contents
        run: ls -la
      - name: Check IP address of server
        run: hostname -I
      #- name: Check connectivity of Internet
      #  run: ping -c 4 -W 5 8.8.8.8
  lists-files:
    runs-on: ubuntu-latest
    steps:
      - name: list of dir
        run: ls -lrt
      - name: Print prashant variable
        run: |
          prashant="hello pk"
          echo $prashant

